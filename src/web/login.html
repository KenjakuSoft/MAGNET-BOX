<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MagnetBox · Sign in</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem('mb-theme');
      if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.dataset.theme = t;
    } catch (e) { document.documentElement.dataset.theme = 'dark'; }
  })();
</script>
<style>
  :root {
    --bg: #0d1014; --surface: #1a212b; --line: #2b3744; --text: #e6edf3;
    --muted: #8b97a6; --accent: #41d6a3; --danger: #ff6b6b; --grad: #16202b;
    --input-bg: #0c1117;
    --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  :root[data-theme="light"] {
    --bg: #f5f7fa; --surface: #ffffff; --line: #d8e0e8; --text: #1a212b;
    --muted: #5c6773; --accent: #0f8a5f; --danger: #d64545; --grad: #e6edf4;
    --input-bg: #f4f7fa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: radial-gradient(900px 500px at 50% -10%, var(--grad) 0%, var(--bg) 60%);
    color: var(--text); font-family: var(--sans);
  }
  .card {
    width: min(380px, 92vw); background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 28px 26px; box-shadow: 0 20px 50px -24px #000;
  }
  h1 { margin: 0 0 2px; font-size: 22px; }
  h1 .box { color: var(--accent); }
  p.sub { margin: 0 0 20px; color: var(--muted); font-size: 13px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
  input {
    width: 100%; background: var(--input-bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 9px; padding: 12px 13px; font: 14px var(--sans); outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus { border-color: #1f6b54; box-shadow: 0 0 0 3px rgba(65,214,163,.12); }
  button {
    width: 100%; margin-top: 22px; background: var(--accent); color: #06211a; border: 0;
    border-radius: 9px; padding: 12px; font: 600 14px var(--sans); cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #54e6b3; }
  button:disabled { opacity: .6; cursor: default; }
  .err { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 12px; }
  .foot { margin-top: 18px; color: var(--muted); font-size: 11px; font-family: var(--mono); text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>
  <form class="card" id="form">
    <h1>Magnet<span class="box">Box</span></h1>
    <p class="sub" id="sub">Sign in to continue</p>
    <div id="step1">
      <label for="u">Username</label>
      <input id="u" name="username" autocomplete="username" autofocus />
      <label for="p">Password</label>
      <input id="p" name="password" type="password" autocomplete="current-password" />
    </div>
    <div id="step2" class="hidden">
      <label for="code">Authentication code</label>
      <input id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code or recovery code" />
    </div>
    <button id="btn" type="submit">Sign in</button>
    <div class="err" id="err"></div>
    <div class="foot">private instance</div>
  </form>
<script>
  const $ = s => document.querySelector(s);
  let CHALLENGE = null;
  $('#form').addEventListener('submit', async (e) => {
    e.preventDefault();
    $('#btn').disabled = true; $('#err').textContent = '';
    try {
      if (CHALLENGE) {
        const r = await fetch('/api/login/2fa', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ challenge: CHALLENGE, code: $('#code').value.trim() })
        });
        const j = await r.json();
        if (!r.ok || j.ok === false) throw new Error(j.error || 'verification failed');
        location.href = '/';
        return;
      }
      const r = await fetch('/api/login', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ username: $('#u').value, password: $('#p').value })
      });
      const j = await r.json();
      if (!r.ok || j.ok === false) throw new Error(j.error || 'login failed');
      if (j.twofa) {
        CHALLENGE = j.challenge;
        $('#step1').classList.add('hidden');
        $('#step2').classList.remove('hidden');
        $('#sub').textContent = 'Enter your two-factor code';
        $('#btn').textContent = 'Verify';
        $('#btn').disabled = false;
        $('#code').focus();
        return;
      }
      location.href = '/';
    } catch (err) {
      $('#err').textContent = err.message;
      $('#btn').disabled = false;
    }
  });
</script>
</body>
</html>
